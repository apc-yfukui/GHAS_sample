<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Vulnerable AI Swiss-Knife</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; line-height: 1.6; }
        .feature { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 80px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .result { background: #f4f4f4; padding: 10px; margin-top: 10px; border-radius: 4px; min-height: 20px; }
    </style>
</head>
<body>
    <h1>脆弱なAI十徳ナイフ (Vulnerable AI Swiss-Knife)</h1>
    
    <div class="feature">
        <h2>A. AI Prompt Injection (LLM01)</h2>
        <p>ユーザー入力をAIプロンプトに結合して要約を生成します。</p>
        <textarea id="summary-text" placeholder="ここにテキストを入力..."></textarea>
        <button onclick="summarize()">要約する</button>
        <div id="summary-result" class="result"></div>
    </div>

    <div class="feature">
        <h2>B. SSRF (A10:2021)</h2>
        <p>指定したURLのドキュメントを読み込みます。</p>
        <input type="text" id="fetch-url" style="width: 80%;" placeholder="http://example.com/doc.txt">
        <button onclick="fetchUrl()">読み込む</button>
        <div id="fetch-result" class="result"></div>
    </div>

    <div class="feature">
        <h2>C. Cross-Site Scripting (A03:2021)</h2>
        <p>AIの回答（Markdown）をプレビューします。</p>
        <textarea id="preview-content" placeholder="<img src=x onerror=alert('XSS')>"></textarea>
        <button onclick="preview()">プレビュー</button>
        <div id="preview-result" class="result"></div>
    </div>

    <script>
        async function summarize() {
            const text = document.getElementById('summary-text').value;
            const resp = await fetch('/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `text=${encodeURIComponent(text)}`
            });
            const data = await resp.json();
            document.getElementById('summary-result').innerText = data.summary;
        }

        async function fetchUrl() {
            const url = document.getElementById('fetch-url').value;
            const resp = await fetch('/fetch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `url=${encodeURIComponent(url)}`
            });
            const data = await resp.json();
            document.getElementById('fetch-result').innerText = data.content || data.error;
        }

        async function preview() {
            const content = document.getElementById('preview-content').value;
            const resp = await fetch('/preview', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `content=${encodeURIComponent(content)}`
            });
            const data = await resp.json();
            // [VULNERABILITY] Use of innerHTML without sanitization
            document.getElementById('preview-result').innerHTML = data.html;
        }
    </script>
</body>
</html>
